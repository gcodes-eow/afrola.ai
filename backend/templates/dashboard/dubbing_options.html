

<div class="bg-white rounded-lg shadow-md p-6">
    <h2 class="text-xl font-semibold mb-4">Dubbing Options</h2>
    <div class="space-y-4">
        <!-- Voice Selection -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Voice</label>
            <select name="voice_model" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                <option value="">Default Voice</option>
                <option value="luganda_male_1">Luganda Male 1</option>
                <option value="luganda_female_1">Luganda Female 1</option>
                <option value="english_male_1">English Male 1</option>
                <option value="english_female_1">English Female 1</option>
            </select>
            <button type="button" class="text-sm text-blue-600 hover:underline mt-1" onclick="previewVoice()">
                ▶ Preview Voice
            </button>
        </div>

        <!-- Speed Adjustment -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Speed: <span id="speed-value">1.0x</span>
            </label>
            <input type="range" min="0.5" max="1.5" step="0.1" value="1.0"
                   class="w-full" oninput="document.getElementById('speed-value').textContent = this.value + 'x'">
        </div>

        <!-- Background Music -->
        <div class="flex items-center space-x-2">
            <input type="checkbox" id="bg_music" class="rounded text-blue-600">
            <label for="bg_music" class="text-sm text-gray-700">Add Background Music</label>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Music Volume</label>
            <input type="range" min="0" max="1" step="0.1" value="0.3" class="w-full">
        </div>
    </div>
</div>

<script>
function previewVoice() {
    const voice = document.querySelector('select[name="voice_model"]').value;
    alert('Voice preview not yet available: ' + voice);
}
</script>
