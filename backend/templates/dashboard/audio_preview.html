

<div class="bg-gray-50 rounded-lg p-4">
    <h3 class="font-medium text-gray-700 mb-2">Audio Preview</h3>
    {% if audio_url %}
    <audio controls class="w-full">
        <source src="{{ audio_url }}" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <p class="text-xs text-gray-500 mt-2">
        <a href="{{ audio_url }}" download class="text-blue-600 hover:underline">Download Audio</a>
    </p>
    {% else %}
    <p class="text-gray-400 text-sm">No audio available yet.</p>
    {% endif %}
</div>
