
{% extends 'base.html' %}

{% block title %}Password Changed - {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8 text-center">
        <h1 class="text-2xl font-bold mb-4 text-green-600">Password Changed!</h1>
        <p class="text-gray-600 mb-4">Your password has been set successfully. You can now log in with your new password.</p>
        <a href="{% url 'accounts:login' %}" class="inline-block bg-blue-600 text-white py-2 px-6 rounded-lg hover:bg-blue-700">
            Go to Login
        </a>
    </div>
</div>
{% endblock %}
