# backend/templates/includes/navbar.html

<nav class="bg-white shadow-md">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <a href="/" class="flex items-center space-x-2">
                <span class="text-2xl font-bold text-blue-600">{{ SITE_NAME }}</span>
            </a>

            <!-- Navigation Links -->
            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard:index' %}" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="{% url 'accounts:profile' %}" class="text-gray-700 hover:text-blue-600">Profile</a>
                    <span class="text-sm text-gray-500">{{ user.email }}</span>
                    <form method="post" action="{% url 'accounts:logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-red-600 hover:text-red-800">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="text-gray-700 hover:text-blue-600">Login</a>
                    <a href="{% url 'accounts:register' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
