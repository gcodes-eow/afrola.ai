# backend/templates/includes/messages.html

{% if messages %}
<div class="container mx-auto px-4 mt-4">
    {% for message in messages %}
    <div class="p-4 mb-2 rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-300{% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-300{% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800 border border-yellow-300{% else %}bg-blue-100 text-blue-800 border border-blue-300{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
