
{% if user.is_authenticated and user.subscription_tier == 'free' %}
<div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <p class="text-sm font-medium">
            🚀 You're on the <strong>Free</strong> plan. Upgrade for more features!
        </p>
        <a href="{% url 'pricing:index' %}"
           class="bg-white text-blue-600 px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-gray-100">
            Upgrade Now
        </a>
    </div>
</div>
{% endif %}
